spring:
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true
    hikari:
      connection-init-sql: SET search_path TO address, public;
      connection-timeout: 10000 # Default: 30_000 = 30 Sekunden
      idle-timeout: 120000 # Default: 600_000 = 10 Minuten
      maximum-pool-size: 3 # Default: 10
      minimum-idle: 1 # Default: maximumPoolSize

  flyway:
    enabled: true
    clean-disabled: false
    locations: classpath:db/migration/prod

  config:
    activate:
      on-profile: prod

# Applikationsspezifische Einstellungen
app:
  geoapify:
    apiKey: ${GEOAPIFY_KEY}
  seed:
    enabled: false
  states:
    api:
      key: ${CSC_API_KEY}
  server:
    port: ${SERVER_PORT}

  postgres:
    url: jdbc:postgresql://${POSTGRES_SQL_HOST}:${POSTGRES_SQL_PORT}/${POSTGRES_SQL_DB}?currentSchema=public
    username: ${POSTGRES_SQL_USERNAME}
    password: ${POSTGRES_SQL_PASSWORD}

  keys:
    path: ${KEYS_PATH}

  http2:
    enabled: ${HTTPS:true}

  ssl:
    enabled: false
